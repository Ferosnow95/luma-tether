<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --bg: var(--figma-color-bg, #ffffff);
    --bg-2: var(--figma-color-bg-secondary, #f5f5f5);
    --bg-3: var(--figma-color-bg-tertiary, #e9e9e9);
    --bg-hover: var(--figma-color-bg-hover, rgba(0,0,0,0.06));
    --bg-sel: var(--figma-color-bg-selected, #e5f0ff);
    --brand: var(--figma-color-bg-brand, #0d99ff);
    --icon: var(--figma-color-icon, #333333);
    --icon-muted: var(--figma-color-icon-secondary, #8a8a8a);
    --text: var(--figma-color-text, #1a1a1a);
    --muted: var(--figma-color-text-secondary, #8a8a8a);
    --stroke: var(--figma-color-border, #e6e6e6);
    --input: var(--figma-color-bg-secondary, #f5f5f5);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; height: 100%;
    font-family: Inter, -apple-system, "Segoe UI", sans-serif;
    font-size: 11px; line-height: 16px;
    color: var(--text); background: var(--bg);
    -webkit-user-select: none; user-select: none;
  }
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }

  .i { width: 16px; height: 16px; display: block; }

  /* ---------- body ---------- */
  #body { flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; }
  #empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; height: 100%;
    color: var(--muted); text-align: center; padding: 24px;
  }
  .empty-icon { color: var(--icon-muted); opacity: .7; }
  .empty-icon .i { width: 34px; height: 34px; }

  .section { border-bottom: 1px solid var(--stroke); }
  .sec-head {
    display: flex; align-items: center; gap: 4px; height: 32px; padding: 0 8px 0 6px; cursor: pointer;
  }
  .sec-head:hover .caret { color: var(--text); }
  .caret { width: 16px; height: 16px; color: var(--icon-muted); transform: rotate(90deg); transition: transform .12s; }
  .section.collapsed .caret { transform: rotate(0deg); }
  .sec-title { font-weight: 600; flex: 1 1 auto; }
  .sec-body { padding: 4px 8px 12px; display: flex; flex-direction: column; gap: 8px; }
  .section.collapsed .sec-body { display: none; }

  .group { display: flex; flex-direction: column; gap: 4px; }
  .sublabel { color: var(--muted); font-size: 10px; }

  .row-grid { display: grid; gap: 8px; }
  .row-flex { display: flex; gap: 6px; align-items: center; }
  .row-flex .field { flex: 1 1 auto; }

  /* ---------- fields ---------- */
  .field {
    display: flex; align-items: center; height: 28px; min-width: 0;
    background: var(--input); border: 1px solid transparent; border-radius: 5px;
    padding: 0 6px; gap: 4px;
  }
  .field:hover { border-color: var(--stroke); }
  .field:focus-within { border-color: var(--brand); background: var(--bg); }
  .field .lead { display: flex; align-items: center; color: var(--icon-muted); flex: 0 0 auto; }
  .field .lead .i { width: 14px; height: 14px; }
  .lead-tx { width: 14px; text-align: center; color: var(--muted); font-size: 11px; }
  .field input {
    flex: 1 1 auto; min-width: 0; width: 100%; height: 100%;
    border: none; background: transparent; outline: none; color: var(--text);
    font-family: inherit; font-size: 11px; padding: 0;
  }
  .field .suf { color: var(--muted); flex: 0 0 auto; }
  .field input::placeholder { color: var(--muted); }
  .field .szsel {
    flex: 0 0 auto; width: auto; height: 20px; padding: 0 2px 0 4px; margin-right: -4px;
    background: transparent; border: none; border-radius: 3px; color: var(--icon-muted);
    font-family: inherit; font-size: 11px; outline: none; cursor: pointer; appearance: none;
  }
  .field .szsel:hover { background: var(--bg-hover); color: var(--text); }

  select {
    height: 28px; width: 100%; min-width: 0; padding: 0 6px;
    background: var(--input); color: var(--text);
    border: 1px solid transparent; border-radius: 5px;
    font-family: inherit; font-size: 11px; outline: none; cursor: pointer;
  }
  select:hover { border-color: var(--stroke); }
  select:focus { border-color: var(--brand); }

  /* ---------- segmented icon buttons ---------- */
  .seg { display: flex; background: var(--input); border-radius: 5px; padding: 2px; gap: 2px; }
  .seg.grow { flex: 1 1 auto; }
  .seg-btn {
    flex: 1 1 auto; height: 24px; min-width: 24px;
    border: none; background: transparent; color: var(--icon); cursor: pointer;
    border-radius: 4px; display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .seg-btn:hover { background: var(--bg-hover); }
  .seg-btn.active { background: var(--bg); color: var(--text); box-shadow: 0 0 0 1px var(--stroke); }

  .icon-btn {
    width: 28px; height: 28px; flex: 0 0 auto;
    border: 1px solid transparent; background: var(--input); color: var(--icon);
    cursor: pointer; border-radius: 5px; display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { border-color: var(--stroke); }
  .icon-btn:active { background: var(--bg-3); }
  .icon-btn.active { background: var(--bg-sel); color: var(--brand); border-color: transparent; }
  .icon-btn.lock { width: 22px; background: transparent; }
  .icon-btn.lock:hover { background: var(--bg-hover); border-color: transparent; }

  .tag { width: 14px; flex: 0 0 auto; text-align: center; color: var(--muted); }

  /* ---------- checkbox row ---------- */
  .check-row { display: flex; align-items: center; gap: 8px; height: 24px; }
  .check-row input { width: 14px; height: 14px; accent-color: var(--brand); cursor: pointer; margin: 0; }
  .check-lab { color: var(--text); }

  /* ---------- color row ---------- */
  .color-row { display: flex; align-items: center; gap: 6px; height: 28px;
    background: var(--input); border: 1px solid transparent; border-radius: 5px; padding: 0 6px; }
  .color-row:hover { border-color: var(--stroke); }
  .color-row:focus-within { border-color: var(--brand); background: var(--bg); }
  .swatch {
    width: 16px; height: 16px; flex: 0 0 auto; border-radius: 3px; cursor: pointer;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); position: relative; padding: 0; border: none;
    background-image: linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);
    background-size: 8px 8px; background-position: 0 0,0 4px,4px -4px,-4px 0;
  }
  .swatch .picker { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; border: none; padding: 0; cursor: pointer; }
  .color-row .hex {
    flex: 1 1 auto; min-width: 0; border: none; background: transparent; outline: none;
    color: var(--text); font-family: inherit; font-size: 11px; text-transform: uppercase;
  }
  .color-row .op { width: 56px; flex: 0 0 auto; height: 24px; background: transparent; border: none; padding: 0; }
  .color-row .op:hover { border: none; }

  /* ---------- alignment pad ---------- */
  .pad-wrap { display: flex; gap: 8px; align-items: center; }
  .pad { display: grid; grid-template-columns: repeat(3,1fr); width: 56px; height: 56px;
    background: var(--input); border-radius: 5px; padding: 4px; flex: 0 0 auto; }
  .pad-wrap .field { flex: 1 1 auto; }
  .pad-cell { border: none; background: transparent; cursor: pointer; border-radius: 3px; position: relative; padding: 0; }
  .pad-cell::after { content:""; position:absolute; left:50%; top:50%; width:5px; height:5px; border-radius:50%;
    transform: translate(-50%,-50%); background: var(--icon-muted); opacity: .5; }
  .pad-cell:hover { background: var(--bg-hover); }
  .pad-cell.active::after { width: 7px; height: 7px; background: var(--brand); opacity: 1; }

  .hidden { display: none !important; }

  /* ---------- entrance animation ---------- */
  @keyframes tetherIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
  @keyframes tetherFade { from { opacity: 0; } to { opacity: 1; } }
  #sections.anim { animation: tetherIn .19s cubic-bezier(.22,.61,.36,1); }
  body.ready #nav { animation: tetherFade .25s ease both; }
  body.ready #body { animation: tetherIn .24s cubic-bezier(.22,.61,.36,1) both; }
  @media (prefers-reduced-motion: reduce) { #sections.anim, body.ready #nav, body.ready #body { animation: none; } }

  /* ---------- list sections (effects / grids / exports) ---------- */
  .sec-add { width: 22px; height: 22px; flex: 0 0 auto; border: none; background: transparent;
    color: var(--icon); cursor: pointer; border-radius: 5px; display: flex; align-items: center; justify-content: center; padding: 0; }
  .sec-add:hover { background: var(--bg-hover); }
  .fx-list { display: flex; flex-direction: column; }
  .fx-row { display: flex; flex-direction: column; gap: 6px; padding: 8px 0; border-bottom: 1px solid var(--stroke); }
  .fx-row:first-child { padding-top: 0; }
  .fx-row:last-child { border-bottom: none; padding-bottom: 0; }
  .fx-line { display: flex; align-items: center; gap: 6px; }
  .fx-line select { flex: 1 1 auto; }
  .fx-params { display: flex; flex-direction: column; gap: 6px; }
  .row-btn { width: 24px; height: 24px; flex: 0 0 auto; border: none; background: transparent;
    color: var(--icon-muted); cursor: pointer; border-radius: 5px; display: flex; align-items: center; justify-content: center; padding: 0; }
  .row-btn:hover { background: var(--bg-hover); color: var(--text); }
  .row-btn.on { color: var(--icon); }

  /* ---------- nav bar (page back/forward + switcher) ---------- */
  #nav { flex: 0 0 auto; display: flex; align-items: center; gap: 4px;
    height: 36px; padding: 0 8px; border-bottom: 1px solid var(--stroke); background: var(--bg); }
  .nav-btn { width: 24px; height: 24px; flex: 0 0 auto; border: none; background: transparent;
    color: var(--icon); cursor: pointer; border-radius: 5px; display: flex; align-items: center; justify-content: center; padding: 0; }
  .nav-btn:hover:not(:disabled) { background: var(--bg-hover); }
  .nav-btn:disabled { color: var(--icon-muted); opacity: .4; cursor: default; }
  .nav-btn.active { color: var(--brand); background: var(--bg-hover); }
  .page-toggle { flex: 1 1 auto; height: 24px; min-width: 0; display: flex; align-items: center; gap: 4px;
    padding: 0 4px 0 8px; background: var(--input); color: var(--text); border: 1px solid transparent;
    border-radius: 5px; font-family: inherit; font-size: 11px; outline: none; cursor: pointer; }
  .page-toggle:hover { border-color: var(--stroke); }
  .page-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; }
  .page-caret { flex: 0 0 auto; width: 16px; height: 16px; color: var(--icon-muted); display: flex; transition: transform .12s ease; }
  #nav.open .page-caret { transform: rotate(180deg); }
  .page-panel { position: absolute; left: 8px; right: 8px; top: 35px; z-index: 50; max-height: 240px; overflow-y: auto;
    background: var(--bg); border: 1px solid var(--stroke); border-radius: 6px; box-shadow: 0 6px 22px rgba(0,0,0,.28); padding: 4px; }
  .page-item { display: flex; align-items: center; gap: 4px; height: 28px; padding: 0 4px; border-radius: 5px;
    cursor: pointer; user-select: none; touch-action: none; }
  .page-item:hover { background: var(--bg-hover); }
  .page-item.current { background: var(--bg-hover); }
  .page-item.dragging { opacity: .65; background: var(--bg-hover); }
  .page-grip { flex: 0 0 auto; width: 16px; height: 16px; color: var(--icon-muted); display: flex; align-items: center; justify-content: center; cursor: grab; }
  .page-label { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .page-check { flex: 0 0 auto; width: 16px; height: 16px; color: var(--brand); display: flex; }

  /* ---------- footer / resize ---------- */
  #footer { flex: 0 0 auto; height: 16px; position: relative; background: var(--bg); }
  #resize { position: absolute; right: 0; bottom: 0; width: 16px; height: 16px; cursor: nwse-resize; }
  #resize::after { content:""; position:absolute; right:3px; bottom:3px; width:7px; height:7px;
    border-right: 1.5px solid var(--icon-muted); border-bottom: 1.5px solid var(--icon-muted); }
</style>
</head>
<body>
  <div id="nav">
    <button id="navBack" class="nav-btn" title="Back (previous page)" disabled></button>
    <button id="navFwd" class="nav-btn" title="Forward" disabled></button>
    <button id="pageToggle" class="page-toggle" title="Pages">
      <span id="pageName" class="page-name">Page</span>
      <span id="pageCaret" class="page-caret"></span>
    </button>
    <button id="followBtn" class="nav-btn" title="Follow selection (snap window beside the selected frame)"></button>
  </div>
  <div id="pagePanel" class="page-panel hidden"></div>
  <div id="body">
    <div id="empty">
      <span id="emptyIcon" class="empty-icon"></span>
      <span>Select a layer to inspect and edit its properties.</span>
    </div>
    <div id="sections"></div>
  </div>
  <div id="footer"><div id="resize" title="Resize"></div></div>

<script>
  const post = (m) => parent.postMessage({ pluginMessage: m }, "*");
  const apply = (field, value) => post({ type: "apply", field, value });
  const cmd = (name) => post({ type: "command", name });
  const list = (kind, action, payload) => post({ type: "list", kind, action, payload: payload || {} });
  const el = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };
  const cap = (s) => s ? s.charAt(0) + s.slice(1).toLowerCase().replace(/_/g, " ") : s;

  // ---------- icons (16px, Figma-style line icons) ----------
  const S = (inner) => `<svg class="i" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
  const bars = (guide, b1, b2) => S(`<path d="${guide}"/><rect ${b1} rx="1" fill="currentColor" stroke="none"/><rect ${b2} rx="1" fill="currentColor" stroke="none"/>`);
  const ICONS = {
    caret: S('<path d="M6 4l4 4-4 4"/>'),
    caretDown: S('<path d="M4.5 6.5l3.5 3.5 3.5-3.5"/>'),
    grip: S('<circle cx="6" cy="4" r="1" fill="currentColor" stroke="none"/><circle cx="6" cy="8" r="1" fill="currentColor" stroke="none"/><circle cx="6" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="10" cy="4" r="1" fill="currentColor" stroke="none"/><circle cx="10" cy="8" r="1" fill="currentColor" stroke="none"/><circle cx="10" cy="12" r="1" fill="currentColor" stroke="none"/>'),
    check: S('<path d="M3.5 8.5l3 3 6-7"/>'),
    layers: S('<path d="M8 2l5.5 3L8 8 2.5 5 8 2z"/><path d="M2.5 8L8 11l5.5-3"/><path d="M2.5 11L8 14l5.5-3"/>'),
    magnet: S('<path d="M3.5 3v4.5a4.5 4.5 0 0 0 9 0V3"/><path d="M3.5 6.5h3M9.5 6.5h3"/>'),
    navBack: S('<path d="M10 4l-4 4 4 4"/>'),
    navFwd: S('<path d="M6 4l4 4-4 4"/>'),
    alignLeft: bars("M2.5 2.5v11", 'x="4.5" y="4.5" width="8" height="2.5"', 'x="4.5" y="9" width="5" height="2.5"'),
    alignHCenter: bars("M8 2.5v11", 'x="3.5" y="4.5" width="9" height="2.5"', 'x="5.5" y="9" width="5" height="2.5"'),
    alignRight: bars("M13.5 2.5v11", 'x="3" y="4.5" width="8" height="2.5"', 'x="6" y="9" width="5" height="2.5"'),
    alignTop: bars("M2.5 2.5h11", 'x="4.5" y="4.5" width="2.5" height="8"', 'x="9" y="4.5" width="2.5" height="5"'),
    alignVCenter: bars("M2.5 8h11", 'x="4.5" y="3.5" width="2.5" height="9"', 'x="9" y="5.5" width="2.5" height="5"'),
    alignBottom: bars("M2.5 13.5h11", 'x="4.5" y="3" width="2.5" height="8"', 'x="9" y="6" width="2.5" height="5"'),
    flipH: S('<path d="M8 2v12" stroke-dasharray="2 1.6"/><path d="M6 4.5L2.5 8 6 11.5z" fill="currentColor" stroke="none"/><path d="M10 4.5L13.5 8 10 11.5z"/>'),
    flipV: S('<path d="M2 8h12" stroke-dasharray="2 1.6"/><path d="M4.5 6L8 2.5 11.5 6z" fill="currentColor" stroke="none"/><path d="M4.5 10L8 13.5 11.5 10z"/>'),
    rotation: S('<path d="M3 13a8 8 0 0 1 7.5-8"/><path d="M3 9.5V13h3.5"/>'),
    corner: S('<path d="M3.5 13.5V8a4.5 4.5 0 0 1 4.5-4.5h5.5"/>'),
    cornerTL: S('<path d="M3 13.5V7.5A4.5 4.5 0 0 1 7.5 3h6"/>'),
    cornerTR: S('<path d="M13 13.5V7.5A4.5 4.5 0 0 0 8.5 3h-6"/>'),
    cornerBL: S('<path d="M3 2.5v6A4.5 4.5 0 0 0 7.5 13h6"/>'),
    cornerBR: S('<path d="M13 2.5v6A4.5 4.5 0 0 1 8.5 13h-6"/>'),
    cornerSides: S('<path d="M5.5 3H4.5A1.5 1.5 0 0 0 3 4.5v1M10.5 3h1A1.5 1.5 0 0 1 13 4.5v1M13 10.5v1a1.5 1.5 0 0 1-1.5 1.5h-1M3 10.5v1A1.5 1.5 0 0 0 4.5 13h1"/>'),
    lockOn: S('<rect x="3.5" y="7" width="9" height="5.5" rx="1.2"/><path d="M5.5 7V5.4a2.5 2.5 0 0 1 5 0V7"/>'),
    lockOff: S('<rect x="3.5" y="7" width="9" height="5.5" rx="1.2"/><path d="M5.5 7V5.4a2.5 2.5 0 0 1 4.7-1.2"/>'),
    opacity: S('<circle cx="8" cy="8" r="5.5"/><path d="M8 2.5a5.5 5.5 0 0 1 0 11z" fill="currentColor" stroke="none"/>'),
    weight: S('<path d="M2 4h12M2 8h12M2 12h12" stroke-width="1.4"/>'),
    szFixed: S('<path d="M4 4v8M12 4v8"/><path d="M6 8h4"/>'),
    szHug: S('<path d="M4 5l3 3-3 3"/><path d="M12 5l-3 3 3 3"/>'),
    szFill: S('<path d="M7 5L4 8l3 3"/><path d="M9 5l3 3-3 3"/><path d="M4.5 8h7" stroke-dasharray="1.5 1.5"/>'),
    padSides: S('<rect x="3" y="3" width="10" height="10" rx="1.5"/><rect x="6" y="6" width="4" height="4" rx="1" stroke-dasharray="1.2 1.2"/>'),
    flowNone: S('<circle cx="5" cy="5" r="1.2" fill="currentColor" stroke="none"/><circle cx="11" cy="5" r="1.2" fill="currentColor" stroke="none"/><circle cx="5" cy="11" r="1.2" fill="currentColor" stroke="none"/><circle cx="11" cy="11" r="1.2" fill="currentColor" stroke="none"/>'),
    flowH: S('<rect x="3" y="4" width="4" height="8" rx="1" fill="currentColor" stroke="none"/><rect x="9" y="4" width="4" height="8" rx="1" fill="currentColor" stroke="none"/>'),
    flowV: S('<rect x="4" y="3" width="8" height="4" rx="1" fill="currentColor" stroke="none"/><rect x="4" y="9" width="8" height="4" rx="1" fill="currentColor" stroke="none"/>'),
    wrap: S('<rect x="3" y="3" width="4" height="4" rx="1" fill="currentColor" stroke="none"/><rect x="9" y="3" width="4" height="4" rx="1" fill="currentColor" stroke="none"/><rect x="3" y="9" width="4" height="4" rx="1" fill="currentColor" stroke="none"/><rect x="9" y="9" width="4" height="4" rx="1" fill="currentColor" stroke="none"/>'),
    padV: S('<path d="M3 3h10M3 13h10"/><rect x="5" y="6" width="6" height="4" rx="1"/>'),
    padH: S('<path d="M3 3v10M13 3v10"/><rect x="6" y="5" width="4" height="6" rx="1"/>'),
    gap: S('<rect x="2" y="4" width="4" height="8" rx="1"/><rect x="10" y="4" width="4" height="8" rx="1"/><path d="M8 6v4"/>'),
    taL: S('<path d="M2 4h12M2 8h8M2 12h10"/>'),
    taC: S('<path d="M2 4h12M4 8h8M3 12h10"/>'),
    taR: S('<path d="M2 4h12M6 8h8M4 12h10"/>'),
    taJ: S('<path d="M2 4h12M2 8h12M2 12h12"/>'),
    eye: S('<path d="M1.5 8S4 3.8 8 3.8 14.5 8 14.5 8 12 12.2 8 12.2 1.5 8 1.5 8z"/><circle cx="8" cy="8" r="1.9"/>'),
    eyeOff: S('<path d="M3 3l10 10"/><path d="M6.6 6.7A2 2 0 0 0 8 10a2 2 0 0 0 1.3-.5"/><path d="M5.2 4.7A6.6 6.6 0 0 1 8 3.8c4 0 6.5 4.2 6.5 4.2a12 12 0 0 1-1.7 2.2M3.4 5.4A12 12 0 0 0 1.5 8S4 12.2 8 12.2a6.6 6.6 0 0 0 1.3-.13"/>'),
    plus: S('<path d="M8 3.2v9.6M3.2 8h9.6"/>'),
    minus: S('<path d="M3.2 8h9.6"/>'),
  };

  const sections = [];

  function makeSection(title, collapsed, onAdd) {
    const wrap = el("div", "section" + (collapsed ? " collapsed" : ""));
    const head = el("div", "sec-head");
    const caret = el("span", "caret"); caret.innerHTML = ICONS.caret;
    const t = el("div", "sec-title"); t.textContent = title;
    head.append(caret, t);
    if (onAdd) { const a = el("button", "sec-add"); a.title = "Add"; a.innerHTML = ICONS.plus; a.onclick = (e) => { e.stopPropagation(); onAdd(); }; head.appendChild(a); }
    const body = el("div", "sec-body");
    head.onclick = () => wrap.classList.toggle("collapsed");
    wrap.append(head, body);
    const sec = { wrap, body, blocks: [], add(b) { body.appendChild(b.el); this.blocks.push(b); return b; } };
    sections.push(sec);
    return sec;
  }

  // ---------- control builders (each returns { el, update(snap)->visibleBool } ) ----------
  const isFocused = (n) => document.activeElement === n;

  // safe recursive-descent math evaluator (no eval) — supports + - * / ^ ( ) and decimals
  function parseMath(str) {
    const s = str.replace(/\s+/g, ""); let i = 0;
    const peek = () => s[i];
    function expr() { let v = term(); while (peek() === "+" || peek() === "-") { const op = s[i++]; const t = term(); v = op === "+" ? v + t : v - t; } return v; }
    function term() { let v = power(); while (peek() === "*" || peek() === "/") { const op = s[i++]; const p = power(); v = op === "*" ? v * p : v / p; } return v; }

    h.addEventListener("change", () => { const v = h.value.trim().replace(/^#/, ""); if (v) list(kind, "param", { index, key: "color", value: "#" + v }); });
    row.append(sw, h);
    if (opacity != null) {
      const ow = el("div", "field op"); const op = el("input"); op.type = "text"; op.inputMode = "decimal";
      op.value = String(opacity); op.dataset.val = String(opacity);
      const pc = el("span", "suf"); pc.textContent = "%"; ow.append(op, pc);
      op.addEventListener("change", () => commitNum(op, (val) => list(kind, "param", { index, key: "opacity", value: val })));
      row.append(ow);
    }
    return row;
  }

  function rowEye(kind, index, visible) {
    const b = el("button", "row-btn" + (visible ? " on" : ""));
    b.innerHTML = visible ? ICONS.eye : ICONS.eyeOff; b.title = "Toggle visibility";
    b.onclick = () => list(kind, "toggle", { index });
    return b;
  }
  function rowRemove(kind, index) {
    const b = el("button", "row-btn"); b.innerHTML = ICONS.minus; b.title = "Remove";
    b.onclick = () => list(kind, "remove", { index });
    return b;
  }
  function grid2(a, b) { const g = el("div", "row-grid"); g.style.gridTemplateColumns = "repeat(2,1fr)"; g.append(a, b); return g; }

  function effectRow(e, i) {
    const row = el("div", "fx-row");
    const line = el("div", "fx-line");
    line.append(optsSel(EFFECT_TYPES, e.type, (v) => list("effects", "type", { index: i, etype: v })), rowEye("effects", i, e.visible), rowRemove("effects", i));
    row.appendChild(line);
    const params = el("div", "fx-params");
    if (e.type === "DROP_SHADOW" || e.type === "INNER_SHADOW") {
      params.append(
        grid2(fxNum("effects", i, "x", e.x, "X"), fxNum("effects", i, "y", e.y, "Y")),
        grid2(fxNum("effects", i, "radius", e.radius, ICONS.opacity), fxNum("effects", i, "spread", e.spread, "S")),
        fxColor("effects", i, e.color, e.opacity)
      );
    } else {
      params.append(fxNum("effects", i, "radius", e.radius, ICONS.opacity));
    }
    row.appendChild(params);
    return row;
  }

  function gridRow(g, i) {
    const row = el("div", "fx-row");
    const line = el("div", "fx-line");
    line.append(optsSel(GRID_TYPES, g.pattern, (v) => list("grids", "type", { index: i, etype: v })), rowEye("grids", i, g.visible), rowRemove("grids", i));
    row.appendChild(line);
    const params = el("div", "fx-params");
    if (g.pattern === "GRID") {
      params.append(fxNum("grids", i, "sectionSize", g.sectionSize, "Size"), fxColor("grids", i, g.color, null));
    } else {
      params.append(
        grid2(fxNum("grids", i, "count", g.count, "Count"), fxNum("grids", i, "gutterSize", g.gutterSize, ICONS.gap)),
        optsSel(GRID_ALIGN, g.alignment || "STRETCH", (v) => list("grids", "param", { index: i, key: "alignment", value: v })),
        grid2(fxNum("grids", i, "sectionSize", g.sectionSize, "Size"), fxNum("grids", i, "offset", g.offset, "Offset")),
        fxColor("grids", i, g.color, null)
      );
    }
    row.appendChild(params);
    return row;
  }

  function exportRow(s, i) {
    const row = el("div", "fx-row");
    const line = el("div", "fx-line");
    line.append(optsSel(EXPORT_FMT, s.format, (v) => list("exports", "type", { index: i, etype: v })), rowRemove("exports", i));
    row.appendChild(line);
    const params = el("div", "fx-params");
    if (s.scale != null) params.append(fxNum("exports", i, "scale", s.scale, "Scale"));
    const sf = el("div", "field"); const inp = el("input"); inp.type = "text"; inp.spellcheck = false; inp.placeholder = "Suffix";
    inp.value = s.suffix || ""; inp.addEventListener("change", () => list("exports", "param", { index: i, key: "suffix", value: inp.value }));
    sf.appendChild(inp); params.append(sf);
    row.appendChild(params);
    return row;
  }

  function listBlock(kind, renderRow) {
    const wrap = el("div", "fx-list");
    return { el: wrap, update: (snap) => {
      const arr = snap[kind];
      if (!arr) { wrap.classList.add("hidden"); return false; }
      wrap.classList.remove("hidden");
      const sig = JSON.stringify(arr);
      if (sig === wrap.dataset.sig) return true;
      if (wrap.contains(document.activeElement)) return true;
      wrap.dataset.sig = sig;
      wrap.innerHTML = "";
      arr.forEach((item, i) => wrap.appendChild(renderRow(item, i)));
      return true;
    } };
  }

  // ===================== build the panel =====================
  function buildPanel() {
    const root = document.getElementById("sections");

    const pos = makeSection("Position");
    pos.add(group("Alignment", [cmdRow([
      { cmd: "align-left", icon: ICONS.alignLeft, title: "Align left" },
      { cmd: "align-h-center", icon: ICONS.alignHCenter, title: "Align horizontal centers" },
      { cmd: "align-right", icon: ICONS.alignRight, title: "Align right" },
      { cmd: "align-top", icon: ICONS.alignTop, title: "Align top" },
      { cmd: "align-v-center", icon: ICONS.alignVCenter, title: "Align vertical centers" },
      { cmd: "align-bottom", icon: ICONS.alignBottom, title: "Align bottom" },
    ], "x")]));
    pos.add(group("Position", [rowGrid([numCell("x", "X"), numCell("y", "Y")])]));
    pos.add(group("Dimensions", [rowFlex([dimCell("width", "layoutSizingHorizontal", "W"), lockField("constrainProportions"), dimCell("height", "layoutSizingVertical", "H")])]));
    pos.add(group("Rotation", [rowFlex([
      numCell("rotation", ICONS.rotation, { suffix: "°" }),
      cmdBtn("flip-h", ICONS.flipH, "Flip horizontal", "x"),
      cmdBtn("flip-v", ICONS.flipV, "Flip vertical", "x"),
    ])]));
    pos.add(group("Constraints", [rowGrid([selectField("constraintH", CH), selectField("constraintV", CV)])]));

    const lay = makeSection("Layout");
    lay.add(group("Flow", [rowFlex([
      segmented("layoutMode", [
        { val: "NONE", icon: ICONS.flowNone, title: "No layout" },
        { val: "HORIZONTAL", icon: ICONS.flowH, title: "Horizontal" },
        { val: "VERTICAL", icon: ICONS.flowV, title: "Vertical" },
      ], true),
      segmented("layoutWrap", [
        { val: "NO_WRAP", icon: ICONS.flowH, title: "No wrap" },
        { val: "WRAP", icon: ICONS.wrap, title: "Wrap" },
      ]),
    ])]));
    lay.add(group("Alignment & gap", [alignPad()]));
    lay.add(paddingBlock());
    lay.add(group("", [checkRow("clipsContent", "Clip content")]));

    const app = makeSection("Appearance");
    app.add(cornerBlock());
    app.add(group("Blend", [selectField("blendMode", BLEND)]));
    app.add(rowGrid([checkRow("visible", "Visible"), checkRow("locked", "Locked")]));

    const fill = makeSection("Fill");
    fill.add(colorRow("fillColor", "fillOpacity"));

    const stroke = makeSection("Stroke");
    stroke.add(colorRow("strokeColor", null));
    stroke.add(group("Position & weight", [rowGrid([selectField("strokeAlign", STROKE_ALIGN), numCell("strokeWeight", ICONS.weight)])]));

    const fx = makeSection("Effects", true, () => list("effects", "add", {}));
    fx.add(listBlock("effects", effectRow));

    const text = makeSection("Text");
    text.add(fontControls());
    text.add(rowGrid([numCell("fontSize", "S"), numCell("lineHeight", "LH")]));
    text.add(rowGrid([numCell("letterSpacing", "LS"), numCell("paragraphSpacing", "PS")]));
    text.add(group("Alignment", [segmented("textAlignHorizontal", [
      { val: "LEFT", icon: ICONS.taL }, { val: "CENTER", icon: ICONS.taC },
      { val: "RIGHT", icon: ICONS.taR }, { val: "JUSTIFIED", icon: ICONS.taJ },
    ], true)]));
    text.add(rowGrid([selectField("textAlignVertical", TVALIGN), selectField("textAutoResize", TRESIZE)]));
    text.add(rowGrid([selectField("textCase", TCASE), selectField("textDecoration", TDECO)]));

    const guide = makeSection("Layout guide", true, () => list("grids", "add", {}));
    guide.add(listBlock("grids", gridRow));

    const exportSec = makeSection("Export", true, () => list("exports", "add", {}));
    exportSec.add(listBlock("exports", exportRow));

    sections.forEach((s) => root.appendChild(s.wrap));
  }

  // ===================== update =====================
  let lastSelKey = "";
  let lastSnap = null;
  function update(snap) {
    lastSnap = snap;
    const hasSel = snap.count > 0;
    document.getElementById("empty").classList.toggle("hidden", hasSel);
    const sectionsEl = document.getElementById("sections");
    sectionsEl.classList.toggle("hidden", !hasSel);
    if (!hasSel) { lastSelKey = ""; return; }
    for (const sec of sections) {
      let vis = false;
      for (const b of sec.blocks) { if (b.update(snap)) vis = true; }
      sec.wrap.classList.toggle("hidden", !vis);
    }
    // animate only when the selection identity changes (not on every property edit)
    const key = snap.count + "|" + snap.type + "|" + snap.name;
    if (key !== lastSelKey) {
      lastSelKey = key;
      sectionsEl.classList.remove("anim");
      void sectionsEl.offsetWidth;
      sectionsEl.classList.add("anim");
    }
  }

  window.onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;
    if (msg.type === "selection") update(msg.snapshot);
    else if (msg.type === "pages") updateNav(msg);
    else if (msg.type === "fonts") { FONTS = { families: msg.families || [], styles: msg.styles || {} }; if (lastSnap) update(lastSnap); }
  };

  // ---------- page navigation ----------
  const navBack = document.getElementById("navBack");
  const navFwd = document.getElementById("navFwd");
  const nav = document.getElementById("nav");
  const pageToggle = document.getElementById("pageToggle");
  const pageName = document.getElementById("pageName");
  const pageCaret = document.getElementById("pageCaret");
  const pagePanel = document.getElementById("pagePanel");
  navBack.innerHTML = ICONS.navBack;
  navFwd.innerHTML = ICONS.navFwd;
  pageCaret.innerHTML = ICONS.caretDown;
  document.getElementById("emptyIcon").innerHTML = ICONS.layers;
  const followBtn = document.getElementById("followBtn");
  followBtn.innerHTML = ICONS.magnet;
  let following = false;
  followBtn.onclick = () => { following = !following; followBtn.classList.toggle("active", following); post({ type: "set-follow", on: following }); };
  navBack.onclick = () => post({ type: "nav-back" });
  navFwd.onclick = () => post({ type: "nav-forward" });

  function openPanel() { nav.classList.add("open"); pagePanel.classList.remove("hidden"); }
  function closePanel() { nav.classList.remove("open"); pagePanel.classList.add("hidden"); }
  pageToggle.onclick = () => { pagePanel.classList.contains("hidden") ? openPanel() : closePanel(); };
  document.addEventListener("pointerdown", (e) => {
    if (pagePanel.classList.contains("hidden")) return;
    if (!pagePanel.contains(e.target) && !pageToggle.contains(e.target)) closePanel();
  }, true);

  // drag a row to reorder pages; a click (no drag) switches to that page
  function attachPageDrag(item) {
    let startY = 0, dragging = false, downId = null;
    item.addEventListener("pointerdown", (e) => {
      if (e.button !== 0) return;
      downId = item.dataset.id; startY = e.clientY; dragging = false;
      try { item.setPointerCapture(e.pointerId); } catch (_) {}
    });
    item.addEventListener("pointermove", (e) => {
      if (downId == null) return;
      if (!dragging && Math.abs(e.clientY - startY) < 4) return;
      dragging = true; item.classList.add("dragging");
      let placed = false;
      for (const s of Array.from(pagePanel.children)) {
        if (s === item) continue;
        const r = s.getBoundingClientRect();
        if (e.clientY < r.top + r.height / 2) { pagePanel.insertBefore(item, s); placed = true; break; }
      }
      if (!placed) pagePanel.appendChild(item);
    });
    const end = (e) => {
      if (downId == null) return;
      try { item.releasePointerCapture(e.pointerId); } catch (_) {}
      if (dragging) {
        item.classList.remove("dragging");
        const index = Array.from(pagePanel.children).indexOf(item);
        post({ type: "reorder-page", id: downId, index });
      } else {
        post({ type: "set-page", id: downId });
        closePanel();
      }
      downId = null; dragging = false;
    };
    item.addEventListener("pointerup", end);
    item.addEventListener("pointercancel", end);
  }

  function buildPagePanel(pages, currentId) {
    pagePanel.innerHTML = "";
    for (const p of pages) {
      const item = el("div", "page-item" + (p.id === currentId ? " current" : ""));
      item.dataset.id = p.id;
      const grip = el("span", "page-grip"); grip.innerHTML = ICONS.grip;
      const label = el("span", "page-label"); label.textContent = p.name || "Page";
      const check = el("span", "page-check"); if (p.id === currentId) check.innerHTML = ICONS.check;
      item.append(grip, label, check);
      attachPageDrag(item);
      pagePanel.appendChild(item);
    }
  }

  function updateNav(msg) {
    const pages = msg.pages || [];
    navBack.disabled = !msg.canBack;
    navFwd.disabled = !msg.canForward;
    const cur = pages.find((p) => p.id === msg.currentId);
    pageName.textContent = cur ? (cur.name || "Page") : "Page";
    const sig = JSON.stringify(pages) + "|" + msg.currentId;
    if (sig === pagePanel.dataset.sig) return;
    pagePanel.dataset.sig = sig;
    buildPagePanel(pages, msg.currentId);
  }


  // ---------- drag to resize ----------
  (function () {
    const grip = document.getElementById("resize");
    let active = false;
    grip.addEventListener("pointerdown", (e) => { active = true; grip.setPointerCapture(e.pointerId); e.preventDefault(); });
    grip.addEventListener("pointermove", (e) => { if (!active) return; post({ type: "resize", width: e.clientX + 4, height: e.clientY + 4 }); });
    const end = (e) => { active = false; try { grip.releasePointerCapture(e.pointerId); } catch (_) {} };
    grip.addEventListener("pointerup", end); grip.addEventListener("pointercancel", end);
  })();

  buildPanel();
  document.body.classList.add("ready");
  post({ type: "get-fonts" });
</script>
</body>
</html>
